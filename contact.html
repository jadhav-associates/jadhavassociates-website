<!-- CONTACT FORM -->
<section class="py-16">

<div class="max-w-4xl mx-auto bg-gray-800 rounded-2xl shadow-2xl p-10">

<h2 class="text-3xl font-bold text-center text-yellow-400 mb-8">
Request a Project Consultation
</h2>

<form action="https://formspree.io/f/xaqdkrob" method="POST" class="space-y-6">

<div class="relative">
<input type="text" name="name" required
class="peer w-full bg-gray-900 border border-gray-600 rounded-lg p-4 text-white focus:border-yellow-400 focus:outline-none">
<label class="absolute left-4 top-4 text-gray-400 transition-all peer-focus:-top-3 peer-focus:text-sm peer-focus:text-yellow-400 peer-valid:-top-3 peer-valid:text-sm bg-gray-800 px-1">
Full Name
</label>
</div>

<div class="relative">
<input type="tel" name="phone" required
class="peer w-full bg-gray-900 border border-gray-600 rounded-lg p-4 text-white focus:border-yellow-400 focus:outline-none">
<label class="absolute left-4 top-4 text-gray-400 transition-all peer-focus:-top-3 peer-focus:text-sm peer-focus:text-yellow-400 peer-valid:-top-3 peer-valid:text-sm bg-gray-800 px-1">
Phone Number
</label>
</div>

<div class="relative">
<input type="email" name="email" required
class="peer w-full bg-gray-900 border border-gray-600 rounded-lg p-4 text-white focus:border-yellow-400 focus:outline-none">
<label class="absolute left-4 top-4 text-gray-400 transition-all peer-focus:-top-3 peer-focus:text-sm peer-focus:text-yellow-400 peer-valid:-top-3 peer-valid:text-sm bg-gray-800 px-1">
Email Address
</label>
</div>

<div class="relative">
<textarea name="message" rows="5" required
class="peer w-full bg-gray-900 border border-gray-600 rounded-lg p-4 text-white focus:border-yellow-400 focus:outline-none"></textarea>
<label class="absolute left-4 top-4 text-gray-400 transition-all peer-focus:-top-3 peer-focus:text-sm peer-focus:text-yellow-400 peer-valid:-top-3 peer-valid:text-sm bg-gray-800 px-1">
Project Details
</label>
</div>

<input type="text" name="_gotcha" style="display:none">

<div class="text-center">
<button type="submit"
class="bg-yellow-500 hover:bg-yellow-400 text-black font-semibold px-10 py-4 rounded-lg transition duration-300 shadow-lg hover:shadow-yellow-500/40">
Send Inquiry →
</button>
</div>

</form>

<div class="mt-12 text-center">
  <h3 class="text-2xl text-yellow-400 mb-4">Our Office</h3>

  <p>
    Jadhav Associates<br>
    Plot no: 11, Wada colony, Opp. New Municipal building, Near Ambika hotel, Shirur<br>
    Pune 412210, Maharashtra, India
  </p>
</div>

    src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d1894.7333549707048!2d74.36245205875599!3d18.82682501522617!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3bc32dca71bb1d85%3A0x4cbe30bb269ed263!2sR9G7%2BP2X%2C%20Shirur%2C%20Maharashtra%20412210!5e0!3m2!1sen!2sin!4v1772367429847!5m2!1sen!2sin"
    width="100%"
    height="350"
    style="border:0;"
    allowfullscreen=""
    loading="lazy"
    referrerpolicy="no-referrer-when-downgrade">
  </iframe>
</div>
  
</div>
